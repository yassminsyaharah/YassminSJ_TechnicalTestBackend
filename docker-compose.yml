version: '3.8'

x-airflow-common: &airflow-common
  image: apache/airflow:2.9.1
  environment:
    AIRFLOW__CORE__EXECUTOR: LocalExecutor
    AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@postgres/airflow
    AIRFLOW__CORE__FERNET_KEY: ''
    AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION: 'true'
    AIRFLOW__CORE__LOAD_EXAMPLES: 'false'
    AIRFLOW__API__AUTH_BACKENDS: 'airflow.api.auth.backend.basic_auth'
    AIRFLOW__WEBSERVER__SECRET_KEY: 'transjakarta_secret_key_2025'
    # Koneksi ke DW PostgreSQL
    AIRFLOW_CONN_TRANSJAKARTA_DW: postgresql+psycopg2://dwuser:dwpassword@postgres_dw/transjakarta_dw
    DW_CONN: postgresql+psycopg2://dwuser:dwpassword@postgres_dw:5432/transjakarta_dw
    _PIP_ADDITIONAL_REQUIREMENTS: 'pandas psycopg2-binary pendulum sqlalchemy apache-airflow-providers-postgres'
  volumes:
    - ./dags:/opt/airflow/dags
    - ./plugins:/opt/airflow/plugins
    - ./data:/opt/airflow/data
    - ./scripts:/opt/airflow/scripts
    - ./logs:/opt/airflow/logs
  depends_on:
    postgres:
      condition: service_healthy
    postgres_dw:
      condition: service_healthy

services:
  # PostgreSQL untuk Airflow metadata
  postgres:
    image: postgres:15
    environment:
      POSTGRES_USER: airflow
      POSTGRES_PASSWORD: airflow
      POSTGRES_DB: airflow
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "airflow"]
      interval: 5s
      retries: 5
    volumes:
      - postgres_airflow_data:/var/lib/postgresql/data

  # PostgreSQL untuk Data Warehouse (source + DW)
  postgres_dw:
    image: postgres:15
    environment:
      POSTGRES_USER: dwuser
      POSTGRES_PASSWORD: dwpassword
      POSTGRES_DB: transjakarta_dw
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "dwuser", "-d", "transjakarta_dw"]
      interval: 5s
      retries: 5
    volumes:
      - postgres_dw_data:/var/lib/postgresql/data
      - ./sql/01_init_source.sql:/docker-entrypoint-initdb.d/01_init_source.sql
      - ./sql/02_init_dw.sql:/docker-entrypoint-initdb.d/02_init_dw.sql

  # Airflow init (migrate DB + create admin user)
  airflow-init:
    <<: *airflow-common
    entrypoint: /bin/bash
    command:
      - -c
      - |
        airflow db migrate &&
        airflow users create \
          --username admin \
          --firstname Admin \
          --lastname User \
          --role Admin \
          --email admin@transjakarta.co.id \
          --password admin
    restart: on-failure

  # Airflow Webserver
  airflow-webserver:
    <<: *airflow-common
    command: webserver
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:8080/health"]
      interval: 10s
      timeout: 10s
      retries: 5
    restart: always
    depends_on:
      airflow-init:
        condition: service_completed_successfully

  # Airflow Scheduler
  airflow-scheduler:
    <<: *airflow-common
    command: scheduler
    restart: always
    depends_on:
      airflow-init:
        condition: service_completed_successfully

volumes:
  postgres_airflow_data:
  postgres_dw_data:
